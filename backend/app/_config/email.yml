---
Name: zooma-mail-config
After:
  - '#mailer'
---
SilverStripe\Core\Injector\Injector:
  Symfony\Component\Mailer\Transport\TransportInterface:
    constructor: null  # Default value breaks the factory override
    factory: null  # Disabling the factory gives more control to this yml file

---
Except:
  environment: 'dev'
---
SilverStripe\Core\Injector\Injector:
  Symfony\Component\Mailer\Transport\TransportInterface:
    class: Symfony\Component\Mailer\Transport\Smtp\EsmtpTransport
    constructor:
      Host: localhost
      Port: 25
---
Only:
  environment: 'dev'
After:
  - '#zooma-mail-config'
---
SilverStripe\Core\Injector\Injector:
  Symfony\Component\Mailer\Transport\TransportInterface:
    class: Symfony\Component\Mailer\Bridge\Amazon\Transport\SesSmtpTransport
    constructor:
      Username: "`SES_SMTP_USERNAME`"
      Password: "`SES_SMTP_PASSWORD`"